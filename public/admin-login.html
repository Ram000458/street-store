<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Street</title>

<link rel="stylesheet" href="css/style.css">

<style>

.login-container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.login-box{
    width:400px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.login-box h1{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

.login-btn{
    width:100%;
    border:none;
    background:#111;
    color:white;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}

.login-btn:hover{
    background:#333;
}

</style>

</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1>Admin Login</h1>

        <form id="adminLoginForm">

            <div class="form-group">
                <input
                type="email"
                id="email"
                placeholder="Admin Email"
                required>
            </div>

            <div class="form-group">
                <input
                type="password"
                id="password"
                placeholder="Password"
                required>
            </div>

            <button
            type="submit"
            class="login-btn">
            Login
            </button>

        </form>

    </div>

</div>

<script>

document
.getElementById("adminLoginForm")
.addEventListener("submit", async(e)=>{

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try{

        const response =
        await fetch("/api/auth/login",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                email,
                password
            })

        });

        const data =
        await response.json();

        if(response.ok){

            localStorage.setItem(
                "token",
                data.token
            );

            alert("Admin Login Successful");

            window.location.href =
            "admin.html";

        }else{

            alert(data.message);

        }

    }catch(error){

        console.error(error);

        alert("Login Failed");

    }

});

</script>

</body>
</html>
