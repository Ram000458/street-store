<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<link rel="stylesheet" href="css/style.css">

<style>

.orders-container{
    padding:120px 8% 50px;
}

.order-card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.order-card h3{
    margin-bottom:10px;
}

.order-card p{
    margin:8px 0;
}

.no-orders{
    text-align:center;
    font-size:20px;
    margin-top:40px;
}

</style>

</head>
<body>

<nav class="navbar">

    <div class="logo">Street Store</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="my-orders.html">My Orders</a></li>
    </ul>

</nav>

<section class="orders-container">

    <h1>My Orders</h1>

    <div id="ordersContainer"></div>

</section>

<script>

const token = localStorage.getItem("token");

if(!token){

    alert("Please login first");

    window.location.href =
    "login.html";

}

async function loadOrders(){

    try{

        const response =
        await fetch("/api/orders/my-orders",{
            headers:{
                "Authorization":
                `Bearer ${token}`
            }
        });

        const orders =
        await response.json();

        const container =
        document.getElementById(
            "ordersContainer"
        );

        container.innerHTML = "";

        if(orders.length === 0){

            container.innerHTML =
            '<div class="no-orders">No Orders Found</div>';

            return;

        }

        orders.forEach(order=>{

            container.innerHTML += `
            <div class="order-card">

                <h3>Order ID</h3>

                <p>${order._id}</p>

                <p>
                <strong>Total:</strong>
                ₹${order.totalAmount}
                </p>

                <p>
                <strong>Address:</strong>
                ${order.shippingAddress}
                </p>

                <p>
                <strong>Payment:</strong>
                ${order.paymentMethod}
                </p>

                <p>
                <strong>Status:</strong>
                ${order.orderStatus}
                </p>

                <p>
                <strong>Date:</strong>
                ${new Date(order.createdAt).toLocaleString()}
                </p>

            </div>
            `;

        });

    }catch(error){

        console.error(error);

    }

}

loadOrders();

</script>

</body>
</html>
