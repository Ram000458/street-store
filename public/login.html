<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Store - Login</title>

<link rel="stylesheet" href="css/style.css">

<style>
.login-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
    padding:100px 20px;
}

.login-box{
    width:100%;
    max-width:450px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.login-box h1{
    text-align:center;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    background:#111;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.login-btn:hover{
    background:#ff4d4d;
}

.signup-link{
    text-align:center;
    margin-top:20px;
}

.signup-link a{
    color:#ff4d4d;
    text-decoration:none;
}
</style>

</head>
<body>

<nav class="navbar">
    <div class="logo">Street</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<section class="login-page">

    <div class="login-box">

        <h1>Login</h1>

        <form id="loginForm">

            <div class="form-group">
                <label>Email</label>
                <input
                type="email"
                id="email"
                required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                type="password"
                id="password"
                required>
            </div>

            <button
            type="submit"
            class="login-btn">
            Login
            </button>

        </form>

        <div class="signup-link">
            Don't have an account?
            <a href="signup.html">
            Sign Up
            </a>
        </div>

    </div>

</section>

<script>

document
.getElementById("loginForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try {

        const response =
        await fetch("/api/auth/login", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                email,
                password
            })

        });

        const data =
        await response.json();

        if(response.ok){

            alert("Login Successful!");

            localStorage.setItem(
                "token",
                data.token
            );

            localStorage.setItem(
                "user",
                JSON.stringify(data.user)
            );

            window.location.href =
            "index.html";

        }else{

            alert(data.message);

        }

    } catch(error){

        console.error(error);

        alert("Login Failed");

    }

});

</script>

</body>
</html>
