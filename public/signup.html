<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Street Store - Sign Up</title>

<link rel="stylesheet" href="css/style.css">

<style>
.signup-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f4f4;
    padding:100px 20px;
}

.signup-box{
    width:100%;
    max-width:500px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.signup-box h1{
    text-align:center;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
}

.signup-btn{
    width:100%;
    padding:14px;
    border:none;
    background:#111;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.signup-btn:hover{
    background:#ff4d4d;
}

.login-link{
    text-align:center;
    margin-top:20px;
}

.login-link a{
    color:#ff4d4d;
    text-decoration:none;
}
</style>

</head>
<body>

<nav class="navbar">
    <div class="logo">Street</div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<section class="signup-page">

    <div class="signup-box">

        <h1>Create Account</h1>

        <form id="signupForm">

            <div class="form-group">
                <label>Full Name</label>
                <input
                type="text"
                id="name"
                required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input
                type="email"
                id="email"
                required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input
                type="password"
                id="password"
                required>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input
                type="password"
                id="confirmPassword"
                required>
            </div>

            <button
            type="submit"
            class="signup-btn">
            Create Account
            </button>

        </form>

        <div class="login-link">
            Already have an account?
            <a href="login.html">
            Login
            </a>
        </div>

    </div>

</section>
<script>

document
.getElementById("signupForm")
.addEventListener("submit", async (e) => {

    e.preventDefault();

    const name =
    document.getElementById("name").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    const confirmPassword =
    document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){

        alert("Passwords do not match!");
        return;

    }

    try{

        const response =
        await fetch("/api/auth/signup",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                name,
                email,
                password
            })

        });

        const data =
        await response.json();

        if(response.ok){

            alert("Account Created Successfully!");

            window.location.href =
            "login.html";

        }else{

            alert(data.message);

        }

    }catch(error){

        console.error(error);

        alert("Signup Failed");

    }

});

</script>
</body>
</html>
